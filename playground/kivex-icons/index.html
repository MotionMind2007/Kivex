<!DOCTYPE html>
<html lang="en">
<head>
    <title>Preview all icons</title>
</head>
<style>
    .icon {
        border: 1px solid black;
        width: 150px;
        height: 150px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 10px;
        flex-wrap: wrap;
    }
    #control {
        display: flex;
        width: 90%;
        margin: 30px;
        align-items: center;
        justify-content: space-between;
        overflow: hidden;
    }
</style>
<body>
    <h2 id="h">All icons</h2>
    <div id="control"></div>
    <div id="icons" style="display: flex; gap: 20px; width: 100%; height: 100vh; flex-wrap: wrap;"></div>
</body>
<script src="main.js" type="module"></script>
</html>
