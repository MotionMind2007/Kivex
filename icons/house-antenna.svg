<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- House body -->
  <rect x="4" y="10" width="16" height="12" />
  <!-- Roof (triangle) -->
  <polygon points="4,10 12,3 20,10" />
  <!-- Antenna mast -->
  <line x1="12" y1="3" x2="12" y2="0.5" />
  <!-- Antenna tip -->
  <circle cx="12" cy="0.5" r="1.5" fill="currentColor" stroke="none" />
  <!-- Door -->
  <rect x="9" y="14" width="6" height="8" />
  <!-- Door knob -->
  <circle cx="13.5" cy="18" r="0.8" fill="currentColor" stroke="none" />
  <!-- Window (optional) -->
  <rect x="6" y="12" width="4" height="4" />
  <rect x="14" y="12" width="4" height="4" />
</svg>